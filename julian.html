<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian442 - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* Weißer Hintergrund passend zu image_35fa0b.png */
            color: #333;
        }

        /* Musik-Controls */
        .music-controls { position: absolute; top: 30px; left: 30px; display: flex; gap: 15px; }
        .control-btn {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            width: 45px; height: 45px;
            border-radius: 50%;
            color: #333;
            cursor: pointer;
            transition: 0.3s;
        }
        .control-btn:hover { background: rgba(0, 0, 0, 0.1); }

        /* Zurück-Button */
        .back-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 10px 20px;
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-btn:hover { color: #000; }

        /* Zentriertes Panel wie in image_35fa0b.png */
        .card {
            background: #ffffff;
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 40px;
        }

        .avatar { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 20px; }
        .sakura { font-size: 3rem; margin-bottom: 20px; }
        .kanji { color: #ff8ca3; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

    <audio id="bg-audio" src="song_Julian442.mp3" loop></audio>

    <div class="music-controls">
        <button class="control-btn" id="play-pause-btn"><i class="fas fa-play"></i></button>
        <button class="control-btn" id="volume-btn"><i class="fas fa-volume-up"></i></button>
    </div>

    <a href="https://synergystation.github.io/" class="back-btn">Zurück</a>

    <div class="card">
        <img src="pictures/julian.profilbild.png" class="avatar" alt="Avatar">
        <div class="sakura">🌸</div>
        <div class="kanji">ジュリアン</div>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');
        const playBtn = document.getElementById('play-pause-btn');
        const volBtn = document.getElementById('volume-btn');

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        };

        volBtn.onclick = () => {
            audio.muted = !audio.muted;
            volBtn.innerHTML = audio.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        };
    </script>
</body>
</html>
