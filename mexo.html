<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexo | Hub</title>
    
    <!-- Optimiertes Favicon für PNG-Bilder mit Transparenz -->
    <link class="icon" type="image/png" sizes="32x32" href="pictures/mexo.profilbild.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #0a0712;
            --accent-cyan: #00f2fe;
            --text-main: #ffffff;
            --text-muted: #8b8ea8;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.07);
            
            --twitch-color: #9146ff;
            --discord-color: #5865f2;
            --github-color: #f0f6fc;
            --tiktok-color: #ff0050;

            --text-gradient: linear-gradient(90deg, #ff8a00, #e61edf, #ff8a00);

            /* Global Announcement Bar - an Mexo-Theme angepasst */
            --gm-bar-bg: rgba(10, 7, 18, 0.9);
            --gm-ink: #ffffff;
            --gm-muted: #8b8ea8;
            --gm-line: rgba(255,255,255,0.08);
            --gm-accent-1: #00f2fe;
            --gm-accent-2: #e61edf;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent; 
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Video-Hintergrund Styling */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: var(--bg-main);
        }

        .bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bg-video-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 7, 18, 0.5); 
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 680px;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            position: absolute;
            top: 25px;
            left: 25px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        
        .back-link:hover {
            opacity: 1;
            color: var(--accent-cyan);
        }

        .profile {
            text-align: center;
            margin-bottom: 8px;
        }

        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
            position: relative;
            z-index: 2;
        }

        .avatar-wrapper::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            z-index: 1;
            filter: blur(6px);
        }

        h1 {
            font-size: 2.1rem;
            margin: 12px 0 3px 0;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .tagline, .status-box h3, .player-box h3 {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            background: var(--text-gradient);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-animation 4s linear infinite;
        }

        .tagline {
            font-size: 0.85rem;
            margin: 0;
        }

        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        /* Status & Player Box Basis-Design */
        .status-box, .player-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px; 
            padding: 25px 40px; 
            text-align: center;
            width: 90%;
            max-width: 550px;
            backdrop-filter: blur(10px); 
            box-sizing: border-box;
        }

        .status-box {
            padding: 25px 85px 45px 85px;
        }

        .status-box h3, .player-box h3 {
            font-size: 0.95rem; 
            margin: 0 0 15px 0; 
            display: inline-block;
        }

        .rizz-text {
            font-size: 1.15rem;
            color: var(--text-main);
            font-weight: 400;
            margin: 0;
        }

        /* Musik-Player UI */
        .track-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .track-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .fa-music.playing {
            animation: bounce 1.2s ease-in-out infinite alternate;
            color: var(--accent-cyan);
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
        }

        .player-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .player-btn:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        .player-btn.play-toggle {
            font-size: 1.8rem;
            color: var(--text-main);
        }

        .player-btn.play-toggle:hover {
            color: var(--accent-cyan);
        }

        /* Lautstärkeregler-Container */
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 60%;
            margin: 0 auto;
        }

        .volume-icon {
            color: var(--text-muted);
            font-size: 0.9rem;
            width: 16px;
            cursor: pointer;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            background: var(--accent-cyan);
            transform: scale(1.2);
        }

        /* Icons-Reihe */
        .links-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            text-decoration: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            font-size: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
        }

        .link-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        .link-btn.twitch:hover {
            background: var(--twitch-color);
            color: #fff;
            box-shadow: 0 5px 20px rgba(145, 70, 255, 0.4);
        }

        .link-btn.discord:hover {
            background: var(--discord-color);
            color: #fff;
            box-shadow: 0 5px 20px rgba(88, 101, 242, 0.4);
        }

        .link-btn.github:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.3);
        }

        .link-btn.tiktok:hover {
            background: linear-gradient(45deg, #ff0050, #00f2fe);
            color: #fff;
            box-shadow: 0 5px 20px rgba(255, 0, 80, 0.4);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
        }

        .footer p {
            font-size: 0.75rem;
            color: #3a3f4a;
        }

        /* View Counter Styling unten rechts */
        .view-counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 8px 14px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            pointer-events: none;
            user-select: none;
        }

        .view-counter i {
            color: var(--accent-cyan);
        }

        /* Reset-Hinweis (nur sichtbar bei ?reset=true) */
        #reset-log {
            position: fixed;
            bottom: 50px;
            right: 20px;
            font-size: 0.75rem;
            color: var(--accent-cyan);
            opacity: 0.85;
            z-index: 10;
        }
        
        /* Taco-Animation für Admin Abuse */
        .taco {
            position: fixed;
            top: -10%;
            font-size: 2rem;
            pointer-events: none;
            animation: fall-taco linear forwards;
            z-index: 999999;
        }
        @keyframes fall-taco {
            0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ============================================================
           GLOBAL ANNOUNCEMENT BAR
           ============================================================ */
        #gm-bar{
            position:fixed;
            top:24px;
            left:50%;
            z-index:99999;
            display:flex;
            align-items:center;
            gap:14px;
            padding:12px 22px 12px 12px;
            border-radius:18px;
            background:var(--gm-bar-bg);
            backdrop-filter: blur(12px);
            border:1px solid var(--gm-line);
            box-shadow: 0 20px 45px -18px rgba(0, 242, 254, 0.35), 0 2px 10px rgba(230, 30, 223, 0.2);
            max-width:min(90vw, 480px);
            transform: translate(-50%, -140%);
            transition: transform .5s cubic-bezier(.22,1.1,.32,1);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #gm-bar.show{ transform: translate(-50%, 0); }

        #gm-bar .gm-avatar{
            width:40px; height:40px;
            border-radius:50%;
            overflow:hidden;
            flex:none;
            background:linear-gradient(150deg, var(--gm-accent-1), var(--gm-accent-2));
            display:flex; align-items:center; justify-content:center;
            box-shadow: inset 0 -3px 8px rgba(0,0,0,0.3);
        }
        #gm-bar .gm-avatar img{ width:100%; height:100%; object-fit:cover; }
        #gm-bar .gm-avatar .gm-initials{
            color:#fff; font-family:system-ui, sans-serif; font-size:13px; font-weight:700;
        }

        #gm-bar .gm-textline{
            display:flex;
            align-items:baseline;
            flex-wrap:wrap;
            gap:6px;
            min-width:0;
        }

        #gm-bar .gm-name{
            color:var(--gm-ink);
            font-weight:700;
            font-size:14px;
            flex:none;
            display:flex;
            align-items:center;
            gap:5px;
        }

        #gm-bar .gm-badge{ width:18px; height:18px; flex:none; }

        #gm-bar .gm-colon{ color:var(--gm-muted); font-weight:700; flex:none; }

        #gm-bar .gm-msg{
            color:var(--gm-ink);
            font-size:14px;
            opacity:.92;
            white-space:normal;
            word-break:break-word;
        }
    </style>
</head>
<body>

    <!-- Global Announcement Bar -->
    <div id="gm-bar">
        <div class="gm-avatar" id="gm-avatar"><span class="gm-initials" id="gm-initials"></span></div>
        <div class="gm-textline">
            <span class="gm-name" id="gm-name">
                <span id="gm-name-text"></span>
                <svg class="gm-badge" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="gmBadgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00f2fe"/>
                            <stop offset="100%" stop-color="#e61edf"/>
                        </linearGradient>
                    </defs>
                    <path fill="url(#gmBadgeGrad)" d="M256 4l36.6 55.9 63.7-19.4 8.9 66.3 66.3 8.9-19.4 63.7L468 256l-55.9 36.6 19.4 63.7-66.3 8.9-8.9 66.3-63.7-19.4L256 468l-36.6-55.9-63.7 19.4-8.9-66.3-66.3-8.9 19.4-63.7L4 256l55.9-36.6-19.4-63.7 66.3-8.9 8.9-66.3 63.7 19.4z"/>
                    <path fill="#fff" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" d="M175 260l50 50 112-112"/>
                </svg>
            </span>
            <span class="gm-colon">:</span>
            <span class="gm-msg" id="gm-msg"></span>
        </div>
    </div>

    <div class="bg-video-container">
        <video autoplay loop muted playsinline class="bg-video">
            <source src="background/bg_mexow.mp4" type="video/mp4">
        </video>
    </div>

    <a href="/" class="back-link">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="container">
        
        <header class="profile">
            <div class="avatar-wrapper">
                <img src="pictures/mexo.profilbild.png" alt="Mexo" class="avatar">
            </div>
            <h1>Mexo</h1>
            <p class="tagline">Developer</p> 
        </header>

        <main class="main-content">
            
            <section class="status-box">
                <h3>Status</h3>
                <p class="rizz-text">Ein Sigma Rizzler</p>
            </section>

            <!-- Custom Musik-Player -->
            <section class="player-box">
                <h3>Music</h3>
                <div class="track-info">
                    <i id="music-icon" class="fas fa-music"></i>
                    <span id="track-title" class="track-title">BLN - Ak Ausserkontrolle</span>
                </div>
                
                <div class="player-controls">
                    <button class="player-btn" id="prev-btn" title="Vorheriger Song">
                        <i class="fas fa-backward"></i>
                    </button>
                    <button class="player-btn play-toggle" id="play-btn" title="Abspielen/Pause">
                        <i class="fas fa-play" id="play-icon"></i>
                    </button>
                    <button class="player-btn" id="next-btn" title="Nächster Song">
                        <i class="fas fa-forward"></i>
                    </button>
                </div>

                <div class="volume-container">
                    <i id="volume-icon" class="fas fa-volume-mute volume-icon"></i>
                    <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
                </div>
            </section>

            <section class="section-box">
                <div class="links-container">
                    <a href="https://www.twitch.tv/marlow_jeep" target="_blank" class="link-btn twitch" title="Twitch"><i class="fab fa-twitch platform-icon"></i></a>
                    <a href="https://dc.gg/ben" target="_blank" class="link-btn discord" title="Discord"><i class="fab fa-discord platform-icon"></i></a>
                    <a href="https://github.com/mexoOG" target="_blank" class="link-btn github" title="GitHub"><i class="fab fa-github platform-icon"></i></a>
                    <a href="https://www.tiktok.com/@mexoyt2.0" target="_blank" class="link-btn tiktok" title="TikTok"><i class="fab fa-tiktok platform-icon"></i></a>
                </div>
            </section>

        </main>

        <footer class="footer">
            <p>© 2026 @mexo</p>
        </footer>
    </div>

    <div class="view-counter">
        <i class="fas fa-eye"></i>
        <span id="view-count">0</span> Views
    </div>

    <div id="reset-log"></div>
    
    <audio id="taco-audio" preload="auto">
        <source src="music/Tacos.mp3" type="audio/mpeg">
    </audio>

    <script>
        const songs = [
            { title: 'BLN - Ak Ausserkontrolle', src: '/music/mexo/Tuff.mp3' },
            { title: 'goosebumps - Travis Scott', src: '/music/mexo/Tuff2.mp3' },
            { title: 'Pink Fluffy Dancing on Rainbows', src: '/music/mexo/Tuff3.mp3' }
        ];

        let currentSongIndex = 0;
        let isPlaying = false;
        const audio = new Audio();
        audio.volume = 0.5;
        const tacoAudio = document.getElementById('taco-audio');

        // Musik-Steuerung
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const musicIcon = document.getElementById('music-icon');
        const volIcon = document.getElementById('volume-icon');
        const volumeSlider = document.getElementById('volume-slider');

        function togglePlay() {
            if (isPlaying) { audio.pause(); playIcon.className = 'fas fa-play'; musicIcon.classList.remove('playing'); }
            else { audio.play().then(() => { playIcon.className = 'fas fa-pause'; musicIcon.classList.add('playing'); }); }
            isPlaying = !isPlaying;
        }

        playBtn.onclick = togglePlay;
        volumeSlider.oninput = (e) => audio.volume = e.target.value;

        // Taco Effect
        let tacoInterval = null;
        function startTacoEffect(durationSeconds) {
            tacoAudio.currentTime = 0;
            tacoAudio.play().catch(e => console.log("Audio blockiert"));
            const endTime = Date.now() + (durationSeconds * 1000);
            tacoInterval = setInterval(() => {
                if(Date.now() > endTime) { stopTacoEffect(); return; }
                const t = document.createElement('div');
                t.className = 'taco';
                t.textContent = '🌮';
                t.style.left = (Math.random() * 95) + '%';
                t.style.animationDuration = (Math.random() * 2 + 2) + 's'; 
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 5000);
            }, 300);
        }
        function stopTacoEffect() { if(tacoInterval) clearInterval(tacoInterval); tacoAudio.pause(); }

        // Global Announcement Bar
        (function(){
            const bar = document.getElementById('gm-bar');
            const avatarWrap = document.getElementById('gm-avatar');
            const nameText = document.getElementById('gm-name-text');
            const msgEl = document.getElementById('gm-msg');

            function showBar(data){
                avatarWrap.innerHTML = data.avatar ? `<img src="${data.avatar}" alt="Avatar">` : '';
                nameText.textContent = data.name;
                msgEl.textContent = data.message;
                bar.classList.add('show');
                setTimeout(() => bar.classList.remove('show'), 8000);
            }

            const es = new EventSource(`https://ntfy.sh/global-massage-broadcast-4471/sse`);
            es.onmessage = function(e){
                try {
                    const data = JSON.parse(JSON.parse(e.data).message);
                    if(data.type === 'announce') showBar(data);
                    else if(data.type === 'taco_rain') startTacoEffect(data.duration || 10);
                    else if(data.type === 'taco_stop') stopTacoEffect();
                } catch(err){}
            };
        })();
    </script>
</body>
</html>
